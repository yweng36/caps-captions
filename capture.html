<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAPS AGM — Capture Switcher</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; background: #0e1b2a;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    color: #e2e8f0; -webkit-font-smoothing: antialiased;
  }

  .wrap {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 32px; padding: 32px;
  }

  h1 { font-size: 18px; font-weight: 600; letter-spacing: .02em; color: #94a3b8; }

  .buttons { display: flex; gap: 16px; }

  .btn {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    width: 180px; padding: 28px 20px;
    border: 2px solid #2d3f55; border-radius: 16px;
    background: #17263a; color: #94a3b8;
    font-size: 20px; font-weight: 700; cursor: pointer;
    transition: border-color .15s, background .15s, color .15s, transform .08s;
    user-select: none;
  }
  .btn .sub { font-size: 11px; font-weight: 500; letter-spacing: .08em; opacity: .7; }
  .btn:hover { border-color: #4a6fa5; color: #e2e8f0; }
  .btn:active { transform: scale(.97); }

  .btn.active-en {
    border-color: #1f6feb; background: #0d2140;
    color: #60a5fa; box-shadow: 0 0 0 4px rgba(31,111,235,.18);
  }
  .btn.active-fr {
    border-color: #c0392b; background: #2d0f0e;
    color: #f87171; box-shadow: 0 0 0 4px rgba(192,57,43,.18);
  }

  .badge {
    font-size: 11px; font-weight: 800; letter-spacing: .1em;
    padding: 3px 8px; border-radius: 5px; color: #fff;
  }
  #badge-en { background: #1f6feb; }
  #badge-fr { background: #c0392b; }

  .stop-btn {
    padding: 10px 24px; border-radius: 8px; border: 1px solid #2d3f55;
    background: transparent; color: #64748b; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  .stop-btn:hover { border-color: #ef4444; color: #ef4444; }
  .stop-btn:disabled { opacity: .3; cursor: default; }

  #status {
    font-size: 13px; color: #475569; min-height: 20px; text-align: center;
  }
  #status.active { color: #94a3b8; }

  #restart-notice {
    font-size: 12px; color: #fb923c; min-height: 18px; text-align: center;
  }

  .hint { font-size: 11px; color: #334155; text-align: center; line-height: 1.7; }

  .pip-btn {
    padding: 8px 18px; border-radius: 8px; border: 1px solid #2d3f55;
    background: transparent; color: #475569; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  .pip-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .pip-btn.pip-active { border-color: #60a5fa; color: #60a5fa; }
  .pip-btn:disabled { opacity: .3; cursor: default; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CAPS AGM — Capture Control</h1>

  <div class="buttons">
    <button class="btn" id="btn-en" onclick="switchTo('en')">
      <span class="badge" id="badge-en">EN</span>
      English Speaker
      <span class="sub">en-US · caps-agm-en</span>
    </button>
    <button class="btn" id="btn-fr" onclick="switchTo('fr')">
      <span class="badge" id="badge-fr">FR</span>
      Français parlé
      <span class="sub">fr-CA · caps-agm-fr</span>
    </button>
  </div>

  <div style="display:flex;gap:10px;align-items:center;justify-content:center">
    <button class="stop-btn" id="stop-btn" onclick="stopCapture()" disabled>
      ■ Stop capture
    </button>
    <button class="pip-btn" id="pip-btn" onclick="openPip()">⛶ Float controls</button>
  </div>

  <div id="status">No capture active</div>
  <div id="restart-notice"></div>

  <div class="hint">
    Keyboard: <b>E</b> = English · <b>F</b> = French · <b>Esc</b> = Stop
  </div>
</div>

<script>
const CAPTURE_URLS = {
  en: "https://caption.ninja/?room=caps-agm-en-miyl2rw8q3&lang=en-US&autofinal=800",
  fr: "https://caption.ninja/?room=caps-agm-fr-3zuxvho7nu&lang=fr-CA&autofinal=800",
};
const ROOM_IDS = {
  en: "caps-agm-en-miyl2rw8q3",
  fr: "caps-agm-fr-3zuxvho7nu",
};

let captureWin     = null;
let activeLang     = null;
let watchdogWs     = null;
let watchdogTimer  = null;
const WATCHDOG_MS  = 10000;
let pipWin         = null;

function resetWatchdog() {
  clearTimeout(watchdogTimer);
  watchdogTimer = setTimeout(() => {
    if (!activeLang) return;
    // Navigate existing popup instead of window.open (avoids popup blocker)
    if (captureWin && !captureWin.closed) {
      captureWin.location.href = CAPTURE_URLS[activeLang];
    } else {
      switchTo(activeLang);
    }
    const notice = document.getElementById("restart-notice");
    notice.textContent = "⟳ Auto-restarted — " + new Date().toLocaleTimeString();
    clearTimeout(notice._clear);
    notice._clear = setTimeout(() => { notice.textContent = ""; }, 5000);
    startWatchdog(activeLang);
  }, WATCHDOG_MS);
}

function startWatchdog(lang) {
  stopWatchdog();
  const ws = new WebSocket("wss://api.caption.ninja:443");
  ws.onopen  = () => { ws.send(JSON.stringify({ join: ROOM_IDS[lang] })); resetWatchdog(); };
  ws.onmessage = () => resetWatchdog();
  ws.onclose = () => { if (watchdogWs === ws) { watchdogWs = null; if (activeLang) startWatchdog(activeLang); } };
  ws.onerror = () => ws.close();
  watchdogWs = ws;
}

function stopWatchdog() {
  clearTimeout(watchdogTimer);
  if (watchdogWs) { watchdogWs.onclose = null; watchdogWs.close(); watchdogWs = null; }
}

function switchTo(lang) {
  if (captureWin && !captureWin.closed) captureWin.close();
  captureWin = window.open(CAPTURE_URLS[lang], "caps_capture",
    "width=900,height=320,menubar=no,toolbar=no,location=yes,status=no");
  activeLang = lang;
  startWatchdog(lang);
  render();
}

function stopCapture() {
  if (captureWin && !captureWin.closed) captureWin.close();
  captureWin = null;
  activeLang = null;
  stopWatchdog();
  render();
}

function render() {
  const enBtn   = document.getElementById("btn-en");
  const frBtn   = document.getElementById("btn-fr");
  const stopBtn = document.getElementById("stop-btn");
  const status  = document.getElementById("status");

  enBtn.className = "btn" + (activeLang === "en" ? " active-en" : "");
  frBtn.className = "btn" + (activeLang === "fr" ? " active-fr" : "");
  stopBtn.disabled = !activeLang;

  if (activeLang === "en") {
    status.textContent = "● Capturing — English (en-US)";
    status.className = "active";
  } else if (activeLang === "fr") {
    status.textContent = "● Capturing — Français (fr-CA)";
    status.className = "active";
  } else {
    status.textContent = "No capture active";
    status.className = "";
  }

  renderPip();
}

async function openPip() {
  if (!window.documentPictureInPicture) {
    alert("Document Picture-in-Picture requires Chrome 116+.");
    return;
  }
  if (pipWin && !pipWin.closed) return;

  pipWin = await documentPictureInPicture.requestWindow({ width: 230, height: 116 });

  const style = pipWin.document.createElement("style");
  style.textContent = `
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e1b2a; font-family: -apple-system, sans-serif;
           padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .row { display: flex; gap: 8px; }
    .pb { flex: 1; padding: 10px 0; border-radius: 8px; border: 2px solid #2d3f55;
          background: #17263a; color: #94a3b8; font-size: 15px; font-weight: 700;
          cursor: pointer; transition: .15s; }
    .pb:hover { border-color: #4a6fa5; color: #e2e8f0; }
    .pb.active-en { border-color: #1f6feb; background: #0d2140; color: #60a5fa; }
    .pb.active-fr { border-color: #c0392b; background: #2d0f0e; color: #f87171; }
    .ps { background: transparent; border: 1px solid #2d3f55; color: #64748b;
          font-size: 12px; font-weight: 500; padding: 6px 0; border-radius: 8px;
          cursor: pointer; transition: .15s; width: 100%; }
    .ps:hover { border-color: #ef4444; color: #ef4444; }
    .ps:disabled { opacity: .3; cursor: default; }
  `;
  pipWin.document.head.appendChild(style);

  pipWin.document.body.innerHTML = `
    <div class="row">
      <button class="pb" id="p-en">EN</button>
      <button class="pb" id="p-fr">FR</button>
    </div>
    <button class="ps" id="p-stop">■ Stop capture</button>
  `;

  pipWin.document.getElementById("p-en").addEventListener("click", () => switchTo("en"));
  pipWin.document.getElementById("p-fr").addEventListener("click", () => switchTo("fr"));
  pipWin.document.getElementById("p-stop").addEventListener("click", () => stopCapture());

  const pipBtn = document.getElementById("pip-btn");
  pipBtn.classList.add("pip-active");
  pipBtn.textContent = "⛶ Floating";
  pipWin.addEventListener("pagehide", () => {
    pipWin = null;
    pipBtn.classList.remove("pip-active");
    pipBtn.textContent = "⛶ Float controls";
  });

  renderPip();
}

function renderPip() {
  if (!pipWin || pipWin.closed) return;
  const enBtn  = pipWin.document.getElementById("p-en");
  const frBtn  = pipWin.document.getElementById("p-fr");
  const stopBtn = pipWin.document.getElementById("p-stop");
  if (!enBtn) return;
  enBtn.className  = "pb" + (activeLang === "en" ? " active-en" : "");
  frBtn.className  = "pb" + (activeLang === "fr" ? " active-fr" : "");
  stopBtn.disabled = !activeLang;
}

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "e" || e.key === "E") switchTo("en");
  if (e.key === "f" || e.key === "F") switchTo("fr");
  if (e.key === "Escape") stopCapture();
});

// Poll to detect if user manually closed the capture window
setInterval(() => {
  if (activeLang && captureWin && captureWin.closed) {
    captureWin = null;
    activeLang = null;
    render();
  }
}, 1000);

if (!window.documentPictureInPicture) {
  document.getElementById("pip-btn").style.display = "none";
}

render();
</script>
</body>
</html>
