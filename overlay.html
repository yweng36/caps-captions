<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions · CAPS AGM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; background: #f8f9fa;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }

  #scroll-area {
    height: 100vh; overflow-y: auto;
    padding: 20px 24px 100px;
  }
  #scroll-area::-webkit-scrollbar       { width: 6px; }
  #scroll-area::-webkit-scrollbar-track { background: transparent; }
  #scroll-area::-webkit-scrollbar-thumb { background: #c8d0da; border-radius: 3px; }

  .row { display: flex; align-items: baseline; gap: 10px; line-height: 1.45; word-break: break-word; }
  .tag { flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: .06em;
         padding: 2px 6px; border-radius: 4px; color: #fff; }
  .tag.en { background: #1f6feb; }
  .tag.fr { background: #c0392b; }

  /* Finalized history */
  #pairs { display: flex; flex-direction: column; gap: 20px; }
  .pair  { display: flex; flex-direction: column; gap: 5px; }
  .row.orig  .text { font-size: 14px; color: #8a9ab0; font-style: italic; }
  .row.xlate .text { font-size: 22px; color: #0e1b2a; font-weight: 500; }

  /* Live in-progress block */
  #live { margin-top: 20px; display: flex; flex-direction: column; gap: 5px; }
  #live-orig, #live-xlate { min-height: 22px; }
  #live-orig  .text { font-size: 14px; color: #8a9ab0; font-style: italic; }
  #live-xlate .text { font-size: 22px; color: #0e1b2a; font-weight: 500; opacity: .45; font-style: italic; }
  .live-tag { opacity: 0; transition: opacity .12s; }
  .live-tag.on { opacity: 1; }

  /* ▼ Live button */
  #live-btn {
    display: none; position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%); align-items: center;
    background: #1f6feb; color: #fff; font-size: 14px; font-weight: 600;
    padding: 10px 20px; border-radius: 999px; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(31,111,235,.35); transition: opacity .2s; z-index: 10;
  }
  #live-btn:hover { opacity: .88; }

  #status { position: fixed; top: 10px; right: 14px; font-size: 11px; color: #bbb; }
</style>
</head>
<body>

<div id="scroll-area">
  <div id="pairs"></div>
  <div id="live">
    <div class="row orig" id="live-orig">
      <span class="tag live-tag" id="lo-tag"></span>
      <span class="text" id="lo-text"></span>
    </div>
    <div class="row xlate" id="live-xlate">
      <span class="tag live-tag" id="lx-tag"></span>
      <span class="text" id="lx-text"></span>
    </div>
  </div>
</div>

<button id="live-btn">▼ Live</button>
<div id="status">connecting…</div>

<script>
const GOOGLE_KEY = "AIzaSyBcNjS1FeOoCg02fKnFk_aIARfUSd8JBh0";

/* ── Room definitions — both always connected ─────────── */
const ROOMS = {
  en: { roomId: "caps-agm-en-miyl2rw8q3", fromlang: "en", tolang: "fr",
        origTag: "EN", origCls: "en", xlateTag: "FR", xlateCls: "fr" },
  fr: { roomId: "caps-agm-fr-3zuxvho7nu", fromlang: "fr", tolang: "en",
        origTag: "FR", origCls: "fr", xlateTag: "EN", xlateCls: "en" },
};

/* ── DOM refs ─────────────────────────────────────────── */
const scrollArea = document.getElementById("scroll-area");
const pairsEl    = document.getElementById("pairs");
const statusEl   = document.getElementById("status");
const liveBtnEl  = document.getElementById("live-btn");
const loTag      = document.getElementById("lo-tag");
const loText     = document.getElementById("lo-text");
const lxTag      = document.getElementById("lx-tag");
const lxText     = document.getElementById("lx-text");

/* ── Scroll ───────────────────────────────────────────── */
let isScrolledUp = false, isAutoScrolling = false;
let returnTimer = null, autoScrollGuard = null;

function nearBottom() {
  return scrollArea.scrollHeight - scrollArea.scrollTop - scrollArea.clientHeight < 80;
}
function scrollToBottom() {
  isAutoScrolling = true;
  scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: "smooth" });
  clearTimeout(autoScrollGuard);
  autoScrollGuard = setTimeout(() => { isAutoScrolling = false; }, 1200);
}
function onNewContent() { if (!isScrolledUp) scrollToBottom(); }

scrollArea.addEventListener("scroll", () => {
  if (isAutoScrolling) {
    if (nearBottom()) {
      isAutoScrolling = false; clearTimeout(autoScrollGuard);
      isScrolledUp = false; clearTimeout(returnTimer); returnTimer = null;
      liveBtnEl.style.display = "none";
    }
    return;
  }
  if (nearBottom()) {
    isScrolledUp = false; clearTimeout(returnTimer); returnTimer = null;
    liveBtnEl.style.display = "none";
  } else {
    if (!isScrolledUp) { isScrolledUp = true; liveBtnEl.style.display = "flex"; }
    clearTimeout(returnTimer);
    returnTimer = setTimeout(() => {
      returnTimer = null; isScrolledUp = false;
      liveBtnEl.style.display = "none"; scrollToBottom();
    }, 5000);
  }
}, { passive: true });

liveBtnEl.addEventListener("click", () => {
  isScrolledUp = false; clearTimeout(returnTimer); returnTimer = null;
  liveBtnEl.style.display = "none"; scrollToBottom();
});

/* ── Google Translate ─────────────────────────────────── */
async function translateText(text, from, to) {
  if (!text.trim()) return "";
  try {
    const res  = await fetch(
      `https://translation.googleapis.com/language/translate/v2`
      + `?key=${GOOGLE_KEY}&q=${encodeURIComponent(text)}`
      + `&source=${from}&target=${to}&format=text`
    );
    const data = await res.json();
    return data?.data?.translations?.[0]?.translatedText || text;
  } catch { return text; }
}

/* ── Dedup helper ─────────────────────────────────────── */
function norm(t) { return t.trim().toLowerCase().replace(/[.!?,;:…]+$/, "").trim(); }

/* ── Live area ────────────────────────────────────────── */
let liveRoomKey    = null;   // which room owns the live area right now
let liveGen        = 0;
let translateTimer = null;
let lastTranslateAt = 0;

function setLiveRoom(key) {
  const cfg = ROOMS[key];
  loTag.textContent = cfg.origTag; loTag.className = `tag live-tag ${cfg.origCls}`;
  lxTag.textContent = cfg.xlateTag; lxTag.className = `tag live-tag ${cfg.xlateCls}`;
  liveRoomKey = key;
}

function setLiveOrig(text, cfg) {
  loText.textContent = text;
  loTag.classList.toggle("on", !!text);
  onNewContent();

  clearTimeout(translateTimer);
  const myGen = ++liveGen;
  if (!text.trim()) { clearLiveXlate(); return; }

  translateTimer = setTimeout(async () => {
    if (liveGen !== myGen) return;
    lastTranslateAt = Date.now();
    const xlate = await translateText(text, cfg.fromlang, cfg.tolang);
    if (liveGen !== myGen) return;
    lxText.textContent = xlate;
    lxTag.classList.toggle("on", !!xlate);
    onNewContent();
  }, 450);
}

function clearLive() {
  liveGen++; clearTimeout(translateTimer);
  loText.textContent = ""; loTag.classList.remove("on");
  lxText.textContent = ""; lxTag.classList.remove("on");
}

function clearLiveXlate() {
  lxText.textContent = ""; lxTag.classList.remove("on");
}

/* ── Finalized pairs ──────────────────────────────────── */
function lastPairOrigText() {
  const all = pairsEl.querySelectorAll(".pair");
  return all.length ? (all[all.length - 1].querySelector(".row.orig .text")?.textContent ?? "") : "";
}

function addPair(origText, xlateText, cfg) {
  const lastOrig = lastPairOrigText();
  if (lastOrig) {
    const nNew = norm(origText), nLast = norm(lastOrig);
    if (nNew === nLast) return;
    if (nLast.length >= 15 && nNew.startsWith(nLast))  { pairsEl.lastElementChild.remove(); }
    else if (nNew.length >= 15 && nLast.startsWith(nNew)) { return; }
  }

  const div  = document.createElement("div"); div.className = "pair";
  const oRow = document.createElement("div"); oRow.className = "row orig";
  const oTag = document.createElement("span"); oTag.className = `tag ${cfg.origCls}`;  oTag.textContent = cfg.origTag;
  const oTxt = document.createElement("span"); oTxt.className = "text"; oTxt.textContent = origText;
  oRow.append(oTag, oTxt);
  const xRow = document.createElement("div"); xRow.className = "row xlate";
  const xTag = document.createElement("span"); xTag.className = `tag ${cfg.xlateCls}`; xTag.textContent = cfg.xlateTag;
  const xTxt = document.createElement("span"); xTxt.className = "text"; xTxt.textContent = xlateText;
  xRow.append(xTag, xTxt);
  div.append(oRow, xRow);
  pairsEl.appendChild(div);
  onNewContent();
}

/* ── Per-room state + final queue ────────────────────── */
const roomState = {};
for (const key of Object.keys(ROOMS)) {
  roomState[key] = { finalQueue: [], processingFinal: false, lastFinalText: "" };
}

async function drainFinalQueue(key) {
  const rs  = roomState[key];
  const cfg = ROOMS[key];
  if (rs.processingFinal) return;
  rs.processingFinal = true;
  while (rs.finalQueue.length > 0) {
    const text = rs.finalQueue.shift();
    if (norm(text) === norm(rs.lastFinalText)) continue;
    rs.lastFinalText = text;
    if (liveRoomKey === key) clearLive();
    const xlate = await translateText(text, cfg.fromlang, cfg.tolang);
    addPair(text, xlate, cfg);
  }
  rs.processingFinal = false;
}

/* ── WebSocket per room ───────────────────────────────── */
let connectedCount = 0;

function connectRoom(key) {
  const cfg = ROOMS[key];
  const rs  = roomState[key];
  let retryDelay = 1000;

  function open() {
    const ws = new WebSocket("wss://api.caption.ninja:443");

    ws.onopen = () => {
      ws.send(JSON.stringify({ join: cfg.roomId }));
      connectedCount++;
      statusEl.textContent = "● live";
      statusEl.style.color = "#4caf50";
      retryDelay = 1000;
    };

    ws.onmessage = (evt) => {
      let data;
      try { data = JSON.parse(evt.data); } catch { return; }

      if (data.c) { if (liveRoomKey === key) clearLive(); return; }

      if (data.final) {
        rs.finalQueue.push(data.final);
        drainFinalQueue(key);
        return;
      }

      if (data.interm) {
        if (rs.processingFinal) return;
        if (data.interm === rs.lastFinalText) return;
        // Switch live area to this room if it just became active
        if (liveRoomKey !== key) setLiveRoom(key);
        setLiveOrig(data.interm, cfg);
      }
    };

    ws.onclose = () => {
      connectedCount = Math.max(0, connectedCount - 1);
      if (connectedCount === 0) {
        statusEl.textContent = "reconnecting…";
        statusEl.style.color = "#bbb";
      }
      setTimeout(open, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 30000);
    };
    ws.onerror = () => ws.close();
  }

  open();
}

Object.keys(ROOMS).forEach(connectRoom);

// Force-translate live text every 1.5s during continuous speech.
// Uses its own gen counter — independent of liveGen (which interim events
// increment constantly), so fast speech no longer blocks the result.
let intervalGen = 0;
setInterval(() => {
  const text = loText.textContent;
  if (!text || !liveRoomKey) return;
  if (Date.now() - lastTranslateAt < 1500) return;
  const cfg = ROOMS[liveRoomKey];
  const myGen = ++intervalGen;
  lastTranslateAt = Date.now();
  translateText(text, cfg.fromlang, cfg.tolang).then(xlate => {
    if (intervalGen !== myGen) return;
    lxText.textContent = xlate;
    lxTag.classList.toggle("on", !!xlate);
    onNewContent();
  });
}, 500);
</script>
</body>
</html>
