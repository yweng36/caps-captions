<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; background: #f8f9fa;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }

  #scroll-area {
    height: 100vh;
    overflow-y: auto;
    padding: 20px 24px 100px;
  }
  #scroll-area::-webkit-scrollbar       { width: 6px; }
  #scroll-area::-webkit-scrollbar-track { background: transparent; }
  #scroll-area::-webkit-scrollbar-thumb { background: #c8d0da; border-radius: 3px; }

  /* Finalized pairs */
  #pairs { display: flex; flex-direction: column; gap: 20px; }

  .pair { display: flex; flex-direction: column; gap: 5px; }

  .row {
    display: flex; align-items: baseline; gap: 10px;
    line-height: 1.45; word-break: break-word;
  }
  .tag {
    flex-shrink: 0; font-size: 10px; font-weight: 700;
    letter-spacing: .06em; padding: 2px 6px;
    border-radius: 4px; color: #fff;
  }
  .tag.en { background: #1f6feb; }
  .tag.fr { background: #c0392b; }

  .row.original .text    { font-size: 14px; color: #8a9ab0; font-style: italic; }
  .row.translation .text { font-size: 22px; color: #0e1b2a; font-weight: 500; }

  /* Live streaming area — completely separate from pairs */
  #live {
    margin-top: 20px;
    display: flex; align-items: baseline; gap: 10px;
    min-height: 22px;
    font-size: 14px; color: #8a9ab0; font-style: italic;
    line-height: 1.45; word-break: break-word;
  }
  #live-tag { opacity: 0; transition: opacity .12s; }
  #live-tag.visible { opacity: 1; }
  #live-text { flex: 1; }

  /* ▼ Live button */
  #live-btn {
    display: none; position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    align-items: center; gap: 6px;
    background: #1f6feb; color: #fff;
    font-size: 14px; font-weight: 600;
    padding: 10px 20px; border-radius: 999px; border: none;
    cursor: pointer; box-shadow: 0 4px 16px rgba(31,111,235,.35);
    transition: opacity .2s; z-index: 10;
  }
  #live-btn:hover { opacity: .88; }

  #status { position: fixed; top: 10px; right: 14px; font-size: 11px; color: #bbb; }
</style>
</head>
<body>

<div id="scroll-area">
  <div id="pairs"></div>
  <div id="live">
    <span id="live-tag"></span>
    <span id="live-text"></span>
  </div>
</div>

<button id="live-btn">▼ Live</button>
<div id="status">connecting…</div>

<script>
/* ── Config ──────────────────────────────────────────────────── */
const GOOGLE_KEY = "AIzaSyBcNjS1FeOoCg02fKnFk_aIARfUSd8JBh0";

const p         = new URLSearchParams(location.search);
const ROOM      = p.get("room");
const FROM_LANG = p.get("fromlang");
const TO_LANG   = p.get("translate");

const scrollArea = document.getElementById("scroll-area");
const pairsEl    = document.getElementById("pairs");
const liveEl     = document.getElementById("live");
const liveTagEl  = document.getElementById("live-tag");
const liveTextEl = document.getElementById("live-text");
const statusEl   = document.getElementById("status");
const liveBtnEl  = document.getElementById("live-btn");

const ORIG_TAG   = (FROM_LANG || "??").toUpperCase();
const XLATE_TAG  = (TO_LANG   || "??").toUpperCase();
const ORIG_CLS   = FROM_LANG || "en";
const XLATE_CLS  = TO_LANG   || "fr";

liveTagEl.textContent = ORIG_TAG;
liveTagEl.classList.add("tag", ORIG_CLS);

/* ── Scroll ──────────────────────────────────────────────────── */
let isScrolledUp    = false;
let isAutoScrolling = false;
let returnTimer     = null;
let autoScrollGuard = null;

function nearBottom() {
  return scrollArea.scrollHeight - scrollArea.scrollTop - scrollArea.clientHeight < 80;
}
function scrollToBottom() {
  isAutoScrolling = true;
  scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: "smooth" });
  clearTimeout(autoScrollGuard);
  autoScrollGuard = setTimeout(() => { isAutoScrolling = false; }, 1200);
}
function showLiveBtn() { liveBtnEl.style.display = "flex"; }
function hideLiveBtn()  { liveBtnEl.style.display = "none"; }

function onNewContent() {
  if (!isScrolledUp) scrollToBottom();
}

scrollArea.addEventListener("scroll", () => {
  if (isAutoScrolling) {
    if (nearBottom()) {
      isAutoScrolling = false;
      clearTimeout(autoScrollGuard);
      isScrolledUp = false;
      clearTimeout(returnTimer); returnTimer = null;
      hideLiveBtn();
    }
    return;
  }
  if (nearBottom()) {
    isScrolledUp = false;
    clearTimeout(returnTimer); returnTimer = null;
    hideLiveBtn();
  } else {
    if (!isScrolledUp) { isScrolledUp = true; showLiveBtn(); }
    clearTimeout(returnTimer);
    returnTimer = setTimeout(() => {
      returnTimer = null; isScrolledUp = false;
      hideLiveBtn(); scrollToBottom();
    }, 5000);
  }
}, { passive: true });

liveBtnEl.addEventListener("click", () => {
  isScrolledUp = false;
  clearTimeout(returnTimer); returnTimer = null;
  hideLiveBtn(); scrollToBottom();
});

/* ── Live area (streaming original only) ─────────────────────── */
function setLiveText(text) {
  liveTextEl.textContent = text;
  liveTagEl.classList.toggle("visible", !!text);
  onNewContent();
}
function clearLiveText() {
  liveTextEl.textContent = "";
  liveTagEl.classList.remove("visible");
}

/* ── Finalized pairs ─────────────────────────────────────────── */
function addPair(origText, xlateText) {
  const div = document.createElement("div");
  div.className = "pair";

  const oRow = document.createElement("div"); oRow.className = "row original";
  const oTag = document.createElement("span"); oTag.className = `tag ${ORIG_CLS}`; oTag.textContent = ORIG_TAG;
  const oTxt = document.createElement("span"); oTxt.className = "text"; oTxt.textContent = origText;
  oRow.appendChild(oTag); oRow.appendChild(oTxt);

  const xRow = document.createElement("div"); xRow.className = "row translation";
  const xTag = document.createElement("span"); xTag.className = `tag ${XLATE_CLS}`; xTag.textContent = XLATE_TAG;
  const xTxt = document.createElement("span"); xTxt.className = "text"; xTxt.textContent = xlateText;
  xRow.appendChild(xTag); xRow.appendChild(xTxt);

  div.appendChild(oRow);
  div.appendChild(xRow);
  pairsEl.appendChild(div);
  onNewContent();
}

/* ── Google Translate ────────────────────────────────────────── */
async function translate(text) {
  if (!text.trim()) return "";
  try {
    const url = `https://translation.googleapis.com/language/translate/v2`
      + `?key=${GOOGLE_KEY}&q=${encodeURIComponent(text)}`
      + `&source=${FROM_LANG}&target=${TO_LANG}&format=text`;
    const res  = await fetch(url);
    const data = await res.json();
    return data?.data?.translations?.[0]?.translatedText || text;
  } catch { return text; }
}

/* ── Final queue — processed one at a time, in order ────────── */
const finalQueue    = [];
let processingQueue = false;
let lastFinalText   = "";

async function drainFinalQueue() {
  if (processingQueue) return;
  processingQueue = true;
  while (finalQueue.length > 0) {
    const text = finalQueue.shift();
    lastFinalText = text;
    clearLiveText();                    // clear live area immediately
    const xlate = await translate(text);
    addPair(text, xlate);              // add completed pair
  }
  processingQueue = false;
}

/* ── WebSocket ───────────────────────────────────────────────── */
let socket, retryDelay = 1000;

function connect() {
  socket = new WebSocket("wss://api.caption.ninja:443");

  socket.onopen = () => {
    socket.send(JSON.stringify({ join: ROOM }));
    statusEl.textContent = "● live";
    statusEl.style.color = "#4caf50";
    retryDelay = 1000;
  };

  socket.onmessage = (evt) => {
    let data;
    try { data = JSON.parse(evt.data); } catch { return; }

    if (data.c) { clearLiveText(); return; }

    if (data.final) {
      finalQueue.push(data.final);
      drainFinalQueue();
      return;
    }

    if (data.interm) {
      if (processingQueue) return;
      if (data.interm === lastFinalText) return;
      setLiveText(data.interm);
    }
  };

  socket.onclose = () => {
    statusEl.textContent = "reconnecting…";
    statusEl.style.color = "#bbb";
    setTimeout(connect, retryDelay);
    retryDelay = Math.min(retryDelay * 2, 30000);
  };
  socket.onerror = () => socket.close();
}

if (ROOM) connect();
else pairsEl.innerHTML = '<div style="color:#c00;padding:20px">No room ID in URL.</div>';
</script>
</body>
</html>
