<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #f8f9fa;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }

  /* Scrollable caption area fills full viewport */
  #scroll-area {
    height: 100vh;
    overflow-y: auto;
    padding: 20px 24px 100px;   /* bottom padding leaves room for Live btn */
    scroll-behavior: smooth;
  }

  /* Custom scrollbar — subtle but visible */
  #scroll-area::-webkit-scrollbar       { width: 6px; }
  #scroll-area::-webkit-scrollbar-track { background: transparent; }
  #scroll-area::-webkit-scrollbar-thumb { background: #c8d0da; border-radius: 3px; }
  #scroll-area::-webkit-scrollbar-thumb:hover { background: #9aa5b4; }

  #container { display: flex; flex-direction: column; gap: 20px; }

  /* ── Caption pair ───────────────────────────────────────────── */
  .pair { display: flex; flex-direction: column; gap: 5px; }

  .row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    line-height: 1.45;
    word-break: break-word;
  }

  .tag {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 2px 6px;
    border-radius: 4px;
    color: #fff;
  }
  .tag.en { background: #1f6feb; }
  .tag.fr { background: #c0392b; }

  .row.original .text     { font-size: 14px; color: #8a9ab0; font-style: italic; }
  .row.translation .text  { font-size: 22px; color: #0e1b2a; font-weight: 500; }

  /* Current (streaming) pair */
  .pair.current .row.original .text    { color: #6b7f96; }
  .pair.current .row.translation .text { color: #5a7aaa; font-weight: 400; }

  /* ── ▼ Live button ──────────────────────────────────────────── */
  #live-btn {
    display: none;            /* shown only when scrolled up */
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    align-items: center;
    gap: 6px;
    background: #1f6feb;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(31,111,235,.35);
    transition: opacity .2s;
    z-index: 10;
  }
  #live-btn:hover { opacity: .88; }

  /* ── Status dot ─────────────────────────────────────────────── */
  #status {
    position: fixed;
    top: 10px;
    right: 14px;
    font-size: 11px;
    color: #bbb;
  }
</style>
</head>
<body>

<div id="scroll-area">
  <div id="container"></div>
</div>

<button id="live-btn">▼ Live</button>
<div id="status">connecting…</div>

<script>
/* ── Config ──────────────────────────────────────────────────── */
const GOOGLE_KEY = "AIzaSyBcNjS1FeOoCg02fKnFk_aIARfUSd8JBh0";

const p         = new URLSearchParams(location.search);
const ROOM      = p.get("room");
const FROM_LANG = p.get("fromlang");
const TO_LANG   = p.get("translate");

const scrollArea  = document.getElementById("scroll-area");
const container   = document.getElementById("container");
const statusEl    = document.getElementById("status");
const liveBtn     = document.getElementById("live-btn");

const originalTag    = (FROM_LANG || "??").toUpperCase();
const translationTag = (TO_LANG   || "??").toUpperCase();
const originalCls    = FROM_LANG || "en";
const translationCls = TO_LANG   || "fr";

/* ── Scroll state ────────────────────────────────────────────── */
let isScrolledUp    = false;
let isAutoScrolling = false;
let returnTimer     = null;
let autoScrollGuard = null;

function nearBottom() {
  return scrollArea.scrollHeight - scrollArea.scrollTop - scrollArea.clientHeight < 80;
}

function scrollToBottom() {
  isAutoScrolling = true;
  scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: "smooth" });
  // Safety net: reset flag if scroll event never fires (e.g., already at bottom)
  clearTimeout(autoScrollGuard);
  autoScrollGuard = setTimeout(() => { isAutoScrolling = false; }, 1200);
}

function showLiveBtn() { liveBtn.style.display = "flex"; }
function hideLiveBtn()  { liveBtn.style.display = "none"; }

// Called whenever new caption content is added
function onNewContent() {
  if (!isScrolledUp) scrollToBottom();
  // Timer is driven only by user scroll events — no timer logic here
}

scrollArea.addEventListener("scroll", () => {
  if (isAutoScrolling) {
    // Programmatic scroll in progress — only check if we've arrived
    if (nearBottom()) {
      isAutoScrolling = false;
      clearTimeout(autoScrollGuard);
      isScrolledUp = false;
      clearTimeout(returnTimer);
      returnTimer = null;
      hideLiveBtn();
    }
    return;
  }

  // Manual scroll
  if (nearBottom()) {
    isScrolledUp = false;
    clearTimeout(returnTimer);
    returnTimer = null;
    hideLiveBtn();
  } else {
    if (!isScrolledUp) { isScrolledUp = true; showLiveBtn(); }
    // Reset 5-second timer on every manual scroll event;
    // fires only after user stops scrolling for 5s
    clearTimeout(returnTimer);
    returnTimer = setTimeout(() => {
      returnTimer = null;
      isScrolledUp = false;
      hideLiveBtn();
      scrollToBottom();
    }, 5000);
  }
}, { passive: true });

liveBtn.addEventListener("click", () => {
  isScrolledUp = false;
  clearTimeout(returnTimer);
  returnTimer = null;
  hideLiveBtn();
  scrollToBottom();
});

/* ── Caption pair state ──────────────────────────────────────── */
let currentPair    = null;
let lastFinalText  = "";
let translateTimer = null;

// Queue ensures finals are processed one-at-a-time, in order
const finalQueue    = [];
let processingQueue = false;

async function drainFinalQueue() {
  if (processingQueue) return;
  processingQueue = true;
  while (finalQueue.length > 0) {
    const text = finalQueue.shift();
    lastFinalText = text;
    const xlate = await translate(text);
    finalizeCurrentPair(text, xlate);
  }
  processingQueue = false;
}

function makeRow(tagLabel, tagCls, rowCls, text) {
  const row  = document.createElement("div");
  row.className = `row ${rowCls}`;
  const tag  = document.createElement("span");
  tag.className = `tag ${tagCls}`;
  tag.textContent = tagLabel;
  const span = document.createElement("span");
  span.className = "text";
  span.textContent = text;
  row.appendChild(tag);
  row.appendChild(span);
  return { row, span };
}

function createCurrentPair(interimText) {
  const el = document.createElement("div");
  el.className = "pair current";
  const { row: oRow, span: oSpan } = makeRow(originalTag,    originalCls,    "original",    interimText);
  const { row: xRow, span: xSpan } = makeRow(translationTag, translationCls, "translation", "");
  el.appendChild(oRow);
  el.appendChild(xRow);
  container.appendChild(el);
  currentPair = { el, origSpan: oSpan, xlateSpan: xSpan };
  onNewContent();
}

function updateCurrentOriginal(text) {
  if (!currentPair) createCurrentPair(text);
  else { currentPair.origSpan.textContent = text; onNewContent(); }
}

function updateCurrentTranslation(text) {
  if (!currentPair) return;
  currentPair.xlateSpan.textContent = text;
}

function finalizeCurrentPair(origText, xlateText) {
  if (!currentPair) createCurrentPair(origText);
  currentPair.origSpan.textContent  = origText;
  currentPair.xlateSpan.textContent = xlateText;
  currentPair.el.classList.remove("current");
  currentPair = null;
  onNewContent();
}

/* ── Google Translate ────────────────────────────────────────── */
async function translate(text) {
  if (!text.trim()) return "";
  try {
    const url = `https://translation.googleapis.com/language/translate/v2`
      + `?key=${GOOGLE_KEY}&q=${encodeURIComponent(text)}`
      + `&source=${FROM_LANG}&target=${TO_LANG}&format=text`;
    const res  = await fetch(url);
    const data = await res.json();
    return data?.data?.translations?.[0]?.translatedText || text;
  } catch { return text; }
}

/* ── WebSocket ───────────────────────────────────────────────── */
let socket, retryDelay = 1000;

function connect() {
  socket = new WebSocket("wss://api.caption.ninja:443");

  socket.onopen = () => {
    socket.send(JSON.stringify({ join: ROOM }));
    statusEl.textContent = "● live";
    statusEl.style.color = "#4caf50";
    retryDelay = 1000;
  };

  socket.onmessage = async (evt) => {
    let data;
    try { data = JSON.parse(evt.data); } catch { return; }

    if (data.c) {
      // clear signal — don't wipe history, just end current pair
      if (currentPair) {
        currentPair.el.classList.remove("current");
        currentPair = null;
      }
      return;
    }

    if (data.final) {
      clearTimeout(translateTimer);
      finalQueue.push(data.final);
      drainFinalQueue();
      return;
    }

    if (data.interm) {
      if (processingQueue) return;
      if (data.interm === lastFinalText) return;
      updateCurrentOriginal(data.interm);
      clearTimeout(translateTimer);
      translateTimer = setTimeout(async () => {
        if (processingQueue) return;
        const xlate = await translate(data.interm);
        updateCurrentTranslation(xlate);
      }, 350);
    }
  };

  socket.onclose = () => {
    statusEl.textContent = "reconnecting…";
    statusEl.style.color = "#bbb";
    setTimeout(connect, retryDelay);
    retryDelay = Math.min(retryDelay * 2, 30000);
  };
  socket.onerror = () => socket.close();
}

if (ROOM) connect();
else container.innerHTML = '<div style="color:#c00;padding:20px">No room ID in URL.</div>';
</script>
</body>
</html>
