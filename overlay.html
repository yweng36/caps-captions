<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; background: #f8f9fa;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }

  #scroll-area {
    height: 100vh; overflow-y: auto;
    padding: 20px 24px 100px;
  }
  #scroll-area::-webkit-scrollbar       { width: 6px; }
  #scroll-area::-webkit-scrollbar-track { background: transparent; }
  #scroll-area::-webkit-scrollbar-thumb { background: #c8d0da; border-radius: 3px; }

  .row { display: flex; align-items: baseline; gap: 10px; line-height: 1.45; word-break: break-word; }
  .tag { flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: .06em;
         padding: 2px 6px; border-radius: 4px; color: #fff; }
  .tag.en { background: #1f6feb; }
  .tag.fr { background: #c0392b; }

  /* ── Finalized history ── */
  #pairs { display: flex; flex-direction: column; gap: 20px; }
  .pair  { display: flex; flex-direction: column; gap: 5px; }
  .row.orig  .text { font-size: 14px; color: #8a9ab0; font-style: italic; }
  .row.xlate .text { font-size: 22px; color: #0e1b2a; font-weight: 500; }

  /* ── Live in-progress block ── */
  #live { margin-top: 20px; display: flex; flex-direction: column; gap: 5px; }

  #live-orig, #live-xlate { min-height: 22px; }
  #live-orig  .text { font-size: 14px; color: #8a9ab0; font-style: italic; }
  #live-xlate .text { font-size: 22px; color: #0e1b2a; font-weight: 500; opacity: .45; font-style: italic; }

  .live-tag { opacity: 0; transition: opacity .12s; }
  .live-tag.on { opacity: 1; }

  /* ▼ Live button */
  #live-btn {
    display: none; position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%); align-items: center; gap: 6px;
    background: #1f6feb; color: #fff; font-size: 14px; font-weight: 600;
    padding: 10px 20px; border-radius: 999px; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(31,111,235,.35); transition: opacity .2s; z-index: 10;
  }
  #live-btn:hover { opacity: .88; }

  #status { position: fixed; top: 10px; right: 14px; font-size: 11px; color: #bbb; }
</style>
</head>
<body>

<div id="scroll-area">
  <div id="pairs"></div>
  <div id="live">
    <div class="row orig" id="live-orig">
      <span class="tag live-tag" id="lo-tag"></span>
      <span class="text" id="lo-text"></span>
    </div>
    <div class="row xlate" id="live-xlate">
      <span class="tag live-tag" id="lx-tag"></span>
      <span class="text" id="lx-text"></span>
    </div>
  </div>
</div>

<button id="live-btn">▼ Live</button>
<div id="status">connecting…</div>

<script>
/* ── Config ─────────────────────────────────────────── */
const GOOGLE_KEY = "AIzaSyBcNjS1FeOoCg02fKnFk_aIARfUSd8JBh0";
const p          = new URLSearchParams(location.search);
const ROOM       = p.get("room");
const FROM_LANG  = p.get("fromlang");
const TO_LANG    = p.get("translate");

const ORIG_TAG  = (FROM_LANG || "??").toUpperCase();
const XLATE_TAG = (TO_LANG   || "??").toUpperCase();
const ORIG_CLS  = FROM_LANG || "en";
const XLATE_CLS = TO_LANG   || "fr";

const scrollArea = document.getElementById("scroll-area");
const pairsEl    = document.getElementById("pairs");
const statusEl   = document.getElementById("status");
const liveBtnEl  = document.getElementById("live-btn");

const loTag  = document.getElementById("lo-tag");
const loText = document.getElementById("lo-text");
const lxTag  = document.getElementById("lx-tag");
const lxText = document.getElementById("lx-text");

loTag.textContent = ORIG_TAG;  loTag.classList.add(ORIG_CLS);
lxTag.textContent = XLATE_TAG; lxTag.classList.add(XLATE_CLS);

/* ── Scroll ─────────────────────────────────────────── */
let isScrolledUp = false, isAutoScrolling = false;
let returnTimer = null, autoScrollGuard = null;

function nearBottom() {
  return scrollArea.scrollHeight - scrollArea.scrollTop - scrollArea.clientHeight < 80;
}
function scrollToBottom() {
  isAutoScrolling = true;
  scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: "smooth" });
  clearTimeout(autoScrollGuard);
  autoScrollGuard = setTimeout(() => { isAutoScrolling = false; }, 1200);
}
function onNewContent() { if (!isScrolledUp) scrollToBottom(); }

scrollArea.addEventListener("scroll", () => {
  if (isAutoScrolling) {
    if (nearBottom()) {
      isAutoScrolling = false; clearTimeout(autoScrollGuard);
      isScrolledUp = false; clearTimeout(returnTimer); returnTimer = null;
      liveBtnEl.style.display = "none";
    }
    return;
  }
  if (nearBottom()) {
    isScrolledUp = false; clearTimeout(returnTimer); returnTimer = null;
    liveBtnEl.style.display = "none";
  } else {
    if (!isScrolledUp) { isScrolledUp = true; liveBtnEl.style.display = "flex"; }
    clearTimeout(returnTimer);
    returnTimer = setTimeout(() => {
      returnTimer = null; isScrolledUp = false;
      liveBtnEl.style.display = "none"; scrollToBottom();
    }, 5000);
  }
}, { passive: true });

liveBtnEl.addEventListener("click", () => {
  isScrolledUp = false; clearTimeout(returnTimer); returnTimer = null;
  liveBtnEl.style.display = "none"; scrollToBottom();
});

/* ── Google Translate ───────────────────────────────── */
async function translate(text) {
  if (!text.trim()) return "";
  try {
    const res  = await fetch(
      `https://translation.googleapis.com/language/translate/v2`
      + `?key=${GOOGLE_KEY}&q=${encodeURIComponent(text)}`
      + `&source=${FROM_LANG}&target=${TO_LANG}&format=text`
    );
    const data = await res.json();
    return data?.data?.translations?.[0]?.translatedText || text;
  } catch { return text; }
}

/* ── Live translation pipeline ──────────────────────────────────────────────
   Model: self-driving pipeline, NOT debounce.

   translateLive(text) is called on every interm update.
   - If no translate is in flight → start one immediately.
   - If one is in flight       → store text as "pending" (latest wins).
   When a translate completes  → show result, then immediately process pending.

   liveGen invalidates everything when the live area is cleared (on final).
   ──────────────────────────────────────────────────────────────────────── */
let liveGen        = 0;   // bumped on clearLive; used to discard stale results
let liveTranslating = false;
let livePending    = null; // latest interm text waiting while translate is in flight

function showLiveOrig(text) {
  loText.textContent = text;
  loTag.classList.toggle("on", !!text);
  onNewContent();
}
function showLiveXlate(text) {
  lxText.textContent = text;
  lxTag.classList.toggle("on", !!text);
  onNewContent();
}
function clearLive() {
  liveGen++;
  liveTranslating = false;
  livePending     = null;
  loText.textContent = ""; loTag.classList.remove("on");
  lxText.textContent = ""; lxTag.classList.remove("on");
}

function translateLive(text, gen) {
  if (gen !== liveGen) return;

  if (liveTranslating) {
    livePending = text;      // pipeline busy — queue the latest text
    return;
  }

  liveTranslating = true;
  livePending     = null;

  translate(text).then(xlate => {
    if (gen !== liveGen) { liveTranslating = false; return; } // stale
    showLiveXlate(xlate);
    liveTranslating = false;

    // Immediately process whatever arrived while we were translating
    if (livePending !== null) {
      const next = livePending;
      livePending = null;
      translateLive(next, liveGen);
    }
  });
}

/* ── Finalized pairs ────────────────────────────────── */
function addPair(origText, xlateText) {
  const div  = document.createElement("div"); div.className = "pair";
  const oRow = document.createElement("div"); oRow.className = "row orig";
  const oTag = document.createElement("span"); oTag.className = `tag ${ORIG_CLS}`;  oTag.textContent = ORIG_TAG;
  const oTxt = document.createElement("span"); oTxt.className = "text"; oTxt.textContent = origText;
  oRow.append(oTag, oTxt);
  const xRow = document.createElement("div"); xRow.className = "row xlate";
  const xTag = document.createElement("span"); xTag.className = `tag ${XLATE_CLS}`; xTag.textContent = XLATE_TAG;
  const xTxt = document.createElement("span"); xTxt.className = "text"; xTxt.textContent = xlateText;
  xRow.append(xTag, xTxt);
  div.append(oRow, xRow);
  pairsEl.appendChild(div);
  onNewContent();
}

/* ── Final queue (sequential, deduped) ─────────────── */
const finalQueue    = [];
let processingFinal = false;
let lastFinalText   = "";

async function drainFinalQueue() {
  if (processingFinal) return;
  processingFinal = true;
  while (finalQueue.length > 0) {
    const text = finalQueue.shift();
    if (text === lastFinalText) continue; // skip exact duplicate finals
    lastFinalText = text;
    clearLive();
    const xlate = await translate(text);
    addPair(text, xlate);
  }
  processingFinal = false;
}

/* ── WebSocket ──────────────────────────────────────── */
let socket, retryDelay = 1000;

function connect() {
  socket = new WebSocket("wss://api.caption.ninja:443");

  socket.onopen = () => {
    socket.send(JSON.stringify({ join: ROOM }));
    statusEl.textContent = "● live";
    statusEl.style.color = "#4caf50";
    retryDelay = 1000;
  };

  socket.onmessage = (evt) => {
    let data;
    try { data = JSON.parse(evt.data); } catch { return; }

    if (data.c) { clearLive(); return; }

    if (data.final) {
      finalQueue.push(data.final);
      drainFinalQueue();
      return;
    }

    if (data.interm) {
      if (processingFinal) return;               // final in progress, hold off
      if (data.interm === lastFinalText) return; // interm repeating a done final
      showLiveOrig(data.interm);
      translateLive(data.interm, liveGen);       // pipeline: fire immediately
    }
  };

  socket.onclose = () => {
    statusEl.textContent = "reconnecting…";
    statusEl.style.color = "#bbb";
    setTimeout(connect, retryDelay);
    retryDelay = Math.min(retryDelay * 2, 30000);
  };
  socket.onerror = () => socket.close();
}

if (ROOM) connect();
else pairsEl.innerHTML = '<div style="color:#c00;padding:20px">No room ID in URL.</div>';
</script>
</body>
</html>
