<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f8f9fa;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    padding: 20px 24px;
    min-height: 100vh;
  }

  #container { display: flex; flex-direction: column; gap: 18px; }

  .pair {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    line-height: 1.45;
    word-break: break-word;
  }

  .tag {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 2px 6px;
    border-radius: 4px;
    color: #fff;
  }
  .tag.en { background: #1f6feb; }
  .tag.fr { background: #c0392b; }

  /* Original line: small, grey */
  .row.original .text {
    font-size: 14px;
    color: #8a9ab0;
    font-style: italic;
  }

  /* Translation line: prominent */
  .row.translation .text {
    font-size: 22px;
    color: #0e1b2a;
    font-weight: 500;
  }

  /* Current (streaming) pair: both rows slightly muted */
  .pair.current .row.original .text  { color: #6b7f96; }
  .pair.current .row.translation .text {
    color: #5a7aaa;
    font-weight: 400;
  }

  #status {
    position: fixed;
    bottom: 10px;
    right: 14px;
    font-size: 11px;
    color: #bbb;
  }
</style>
</head>
<body>
<div id="container"></div>
<div id="status">connecting…</div>

<script>
/* ── Config ──────────────────────────────────────────────────── */
const GOOGLE_KEY = "AIzaSyBcNjS1FeOoCg02fKnFk_aIARfUSd8JBh0";
const MAX_PAIRS  = 2;   // completed pairs kept on screen

const p          = new URLSearchParams(location.search);
const ROOM       = p.get("room");
const FROM_LANG  = p.get("fromlang");   // "en" or "fr"
const TO_LANG    = p.get("translate");  // "fr" or "en"

const container  = document.getElementById("container");
const statusEl   = document.getElementById("status");

/* ── Language labels ─────────────────────────────────────────── */
const TAG = { en: "EN", fr: "FR" };
const originalTag    = FROM_LANG?.toUpperCase() || "??";
const translationTag = TO_LANG?.toUpperCase()   || "??";
const originalCls    = FROM_LANG || "en";
const translationCls = TO_LANG   || "fr";

/* ── State ───────────────────────────────────────────────────── */
let completedPairs       = [];   // DOM elements
let currentPair          = null; // { el, origText, xlateText }
let translateTimer       = null;
let ignoringInterimUntil = 0;

/* ── DOM helpers ─────────────────────────────────────────────── */
function makeRow(tagLabel, tagCls, rowCls, text, textMod) {
  const row  = document.createElement("div");
  row.className = `row ${rowCls}`;

  const tag  = document.createElement("span");
  tag.className = `tag ${tagCls}`;
  tag.textContent = tagLabel;

  const span = document.createElement("span");
  span.className = `text${textMod ? " " + textMod : ""}`;
  span.textContent = text;

  row.appendChild(tag);
  row.appendChild(span);
  return { row, span };
}

function createCurrentPair(interimText) {
  const el = document.createElement("div");
  el.className = "pair current";

  const { row: origRow,  span: origSpan  } = makeRow(originalTag,    originalCls,    "original",    interimText, "");
  const { row: xlateRow, span: xlateSpan } = makeRow(translationTag, translationCls, "translation", "", "");

  el.appendChild(origRow);
  el.appendChild(xlateRow);
  container.appendChild(el);

  currentPair = { el, origSpan, xlateSpan };
}

function updateCurrentOriginal(text) {
  if (!currentPair) createCurrentPair(text);
  else currentPair.origSpan.textContent = text;
}

function updateCurrentTranslation(text) {
  if (!currentPair) return;
  currentPair.xlateSpan.textContent = text;
}

function finalizeCurrentPair(origText, xlateText) {
  if (!currentPair) createCurrentPair(origText);

  currentPair.origSpan.textContent  = origText;
  currentPair.xlateSpan.textContent = xlateText;
  currentPair.el.classList.remove("current");

  completedPairs.push(currentPair.el);
  currentPair = null;

  while (completedPairs.length > MAX_PAIRS) {
    completedPairs[0].remove();
    completedPairs.shift();
  }
}

function clearAll() {
  container.innerHTML = "";
  completedPairs = [];
  currentPair = null;
}

/* ── Google Translate ────────────────────────────────────────── */
async function translate(text) {
  if (!text.trim()) return "";
  try {
    const url = `https://translation.googleapis.com/language/translate/v2`
      + `?key=${GOOGLE_KEY}&q=${encodeURIComponent(text)}`
      + `&source=${FROM_LANG}&target=${TO_LANG}&format=text`;
    const res  = await fetch(url);
    const data = await res.json();
    return data?.data?.translations?.[0]?.translatedText || text;
  } catch {
    return text;
  }
}

/* ── WebSocket ───────────────────────────────────────────────── */
let socket, retryDelay = 1000;

function connect() {
  socket = new WebSocket("wss://api.caption.ninja:443");

  socket.onopen = () => {
    socket.send(JSON.stringify({ join: ROOM }));
    statusEl.textContent = "live";
    retryDelay = 1000;
  };

  socket.onmessage = async (evt) => {
    let data;
    try { data = JSON.parse(evt.data); } catch { return; }

    if (data.c) { clearAll(); return; }

    if (data.final) {
      clearTimeout(translateTimer);
      ignoringInterimUntil = Date.now() + 600;
      const xlate = await translate(data.final);
      finalizeCurrentPair(data.final, xlate);
      return;
    }

    if (data.interm) {
      if (Date.now() < ignoringInterimUntil) return;
      updateCurrentOriginal(data.interm);
      clearTimeout(translateTimer);
      translateTimer = setTimeout(async () => {
        const xlate = await translate(data.interm);
        updateCurrentTranslation(xlate);
      }, 350);
    }
  };

  socket.onclose = () => {
    statusEl.textContent = "reconnecting…";
    setTimeout(connect, retryDelay);
    retryDelay = Math.min(retryDelay * 2, 30000);
  };
  socket.onerror = () => socket.close();
}

if (ROOM) connect();
else container.innerHTML = '<div style="color:#c00;padding:20px">No room ID in URL.</div>';
</script>
</body>
</html>
